name: Cross-Compile Cuberite for x86 i686 (GCC, glibc)

on:
  workflow_dispatch:

jobs:
  build-i686:
    name: x86 i686 Static Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Cuberite with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            file \
            zip \
            python3 \
            gawk \
            bison \
            flex \
            texinfo \
            help2man \
            libtool \
            automake \
            autoconf \
            gcc-multilib \
            g++-multilib \
            upx \
            lua5.3

      - name: Symlink lua5.3 to lua if needed
        run: |
          if ! command -v lua >/dev/null && command -v lua5.3 >/dev/null; then
            sudo ln -s "$(command -v lua5.3)" /usr/local/bin/lua
          fi

      - name: Configure Cuberite for i686 static build
        run: |
          export CC=gcc
          export CXX=g++

          mkdir build
          cd build

          cmake .. -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=i686 \
            -DCMAKE_C_COMPILER=${CC} \
            -DCMAKE_CXX_COMPILER=${CXX} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_C_FLAGS="-m32 -static -static-libgcc -march=i686" \
            -DCMAKE_CXX_FLAGS="-m32 -static -static-libgcc -static-libstdc++ -march=i686"

      - name: Build Cuberite for i686
        run: |
          cmake --build build --config Release -j$(nproc)

      - name: List built contents
        run: |
          ls -lh build/Server || echo "No contents found in build/Server"

      - name: Strip and compress the Cuberite binary
        run: |
          BIN="build/Server/Cuberite"
          if [ -f "$BIN" ]; then
            file "$BIN"
            strip "$BIN" || echo "Skipping strip"
            upx --best --lzma "$BIN" || echo "UPX compression skipped"
          fi

      - name: Upload full Cuberite Server folder
        uses: actions/upload-artifact@v4
        with:
          name: cuberite-i686-static-server
          path: build/Server/
