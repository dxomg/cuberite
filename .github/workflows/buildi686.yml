name: Build Cuberite for x86 i686 (Alpine)

on:
  workflow_dispatch:

jobs:
  build-i686:
    name: i686 Static Build (Alpine)
    runs-on: ubuntu-latest

    container:
      image: alpine:3.20

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            build-base \
            cmake \
            ninja \
            git \
            curl \
            wget \
            file \
            zip \
            python3 \
            lua5.3 \
            linux-headers \
            upx

      - name: Checkout Cuberite with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Cuberite for i686
        run: |
          mkdir build
          cd build

          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_PROCESSOR=i686 \
            -DCMAKE_C_FLAGS="-m32 -march=i686 -mtune=i686 -static" \
            -DCMAKE_CXX_FLAGS="-m32 -march=i686 -mtune=i686 -static"

      - name: Build Cuberite
        run: |
          cmake --build build -j$(nproc)

      - name: List built contents
        run: |
          ls -lh build/Server || echo "No contents found"

      - name: Strip and compress
        run: |
          BIN="build/Server/Cuberite"
          if [ -f "$BIN" ]; then
            file "$BIN"
            strip "$BIN"
            upx --best --lzma "$BIN" || echo "UPX skipped"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuberite-i686-alpine-static
          path: build/Server/
